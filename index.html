<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Last Alliance - Protótipo Factions (V14.1 - Sem Scanner)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --theme-color: #00ff41; 
            --theme-glow: rgba(0, 255, 65, 0.7);
            --theme-bg: rgba(0, 255, 65, 0.1);
            
            --vt-alert: #ff3333; 
            --vt-alert-glow: rgba(255, 51, 51, 0.7);
            --vt-alert-bg: rgba(255, 51, 51, 0.1);
            
            --vt-panel-frame: #444;
            --dark-metal: #1a1a1a;
            --scanline-color: rgba(0, 0, 0, 0.2);
            --flicker-anim: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        .screen-glitch-tilt {
            transform: translate(-1px, 1px) skew(-1deg, 1deg);
            filter: contrast(1.4) brightness(1.1);
        }
        .screen-glitch-fail {
            transform: translate(1px, -1px);
            filter: blur(1px) opacity(0.8);
        }

        body {
            font-family: 'VT323', monospace; 
            background-color: #0d0d0d;
            background-image: linear-gradient(0deg, transparent 24%, var(--theme-bg) 25%, var(--theme-bg) 26%, transparent 27%, transparent 74%, var(--theme-bg) 75%, var(--theme-bg) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, var(--theme-bg) 25%, var(--theme-bg) 26%, transparent 27%, transparent 74%, var(--theme-bg) 75%, var(--theme-bg) 76%, transparent 77%, transparent);
            background-size: 50px 50px; 
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; 
            height: 100vh;
            margin: 0;
            overflow: hidden; 
            padding: 10px;
            box-sizing: border-box;
            animation: var(--flicker-anim); 
            touch-action: none; 
        }

        #hud-frame {
            border: 4px solid var(--vt-panel-frame);
            background-color: var(--dark-metal);
            width: 100%;
            height: 100%;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            overflow: hidden; 
            transition: transform 0.05s ease, filter 0.05s ease;
        }

        #hud-frame::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, var(--scanline-color) 50%);
            background-size: 100% 4px;
            z-index: 1000;
            pointer-events: none;
            border-radius: 6px;
        }

        .digital-text {
            color: var(--theme-color);
            text-shadow: 0 0 10px var(--theme-glow);
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
            transition: color 0.5s ease, text-shadow 0.5s ease; 
        }

        h1.digital-text, h2.digital-text, #timer.digital-text, #silo-info.digital-text {
            font-family: 'Press Start 2P', cursive;
        }

        #header-panel {
            border-bottom: 2px solid var(--vt-panel-frame);
            background-color: #262626;
            padding: 10px;
            text-align: center;
            z-index: 10;
        }
        #timer { font-size: 1.5em; color: var(--vt-alert); text-shadow: 0 0 10px var(--vt-alert-glow); margin-bottom: 5px;}
        
        #silo-info { 
            font-size: 1.2em; 
            margin: 10px auto; 
            letter-spacing: 1px;
            border: 2px solid var(--theme-color);
            background-color: var(--theme-bg);
            padding: 8px 15px;
            border-radius: 5px;
            display: inline-block; 
            box-shadow: inset 0 0 10px var(--theme-bg);
            transition: all 0.5s ease;
        }
        
        .target-item { display: inline-block; margin: 0 10px; font-size: 1.2em; font-family: 'VT323', monospace; }
        
        #game-area {
            flex-grow: 1; 
            position: relative;
            width: 100%;
            z-index: 5;
        }

        #game-area::before {
            content: ">> ESTEIRA >>";
            position: absolute;
            bottom: 5%; left: 0; width: 100%;
            color: var(--theme-bg);
            font-size: 0.8em;
            text-align: center;
            letter-spacing: 5px;
        }

        #spawner-container, #items-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px; 
        }
        
        @keyframes boxSlideIn {
            0% { transform: translateX(-300px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes boxOpen {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(0); opacity: 0;}
        }

        .box {
            font-size: 5em; 
            cursor: pointer; 
            user-select: none;
            display: block;
            animation: boxSlideIn 0.5s ease-out; 
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            touch-action: none; 
        }
        .box.opening { animation: boxOpen 0.3s ease-in forwards; pointer-events: none;}

        @keyframes itemFadeIn {
            0% { opacity: 0; transform: scale(0.5) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        @keyframes itemExplode {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(0); opacity: 0; }
        }

        .item {
            font-size: 4em; 
            cursor: grab;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: itemFadeIn 0.3s ease-out;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
            touch-action: none;
        }
        .item.exploding { animation: itemExplode 0.2s ease-in forwards; pointer-events: none;}
        
        #bottom-bar {
            border-top: 2px solid var(--vt-panel-frame);
            background-color: #262626;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            min-height: 120px;
            z-index: 10;
        }

        #needs-bins-cluster { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;} 
        #trash-bin-area { display: flex; justify-content: center; } 

        .bin {
            width: 100px; 
            height: 100px;
            border: 3px dashed var(--vt-panel-frame);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            color: #666;
            position: relative;
        }
        .bin * { pointer-events: none; }
        .bin span { font-size: 0.35em; margin-top: 5px; text-transform: uppercase; font-weight: bold; font-family: 'VT323', monospace; letter-spacing: 1px; text-align: center;}
        
        .bin.target-bin {
            border-color: #555; 
        }
        .bin.target-bin.drag-over {
            background-color: var(--theme-bg);
            border-color: var(--theme-color);
            color: var(--theme-color);
            box-shadow: 0 0 15px var(--theme-glow);
            transform: scale(1.05);
        }

        .bin.waste-bin {
            border-color: var(--vt-alert);
            color: var(--vt-alert);
            background-color: var(--vt-alert-bg);
        }
        .bin.waste-bin.drag-over {
            background-color: var(--vt-alert-bg);
            box-shadow: 0 0 15px var(--vt-alert-glow);
        }
        
        @media screen and (max-width: 768px) and (orientation: portrait) {
            #bottom-bar {
                flex-direction: column;
                gap: 10px;
                padding: 10px 5px;
            }
            #needs-bins-cluster { margin-bottom: 5px; }
            .bin { width: 80px; height: 80px; font-size: 2em; }
            .box { font-size: 4em; }
            .item { font-size: 3em; }
            #items-container { gap: 10px; }
            .target-item { font-size: 1em; margin: 0 5px;}
            #silo-info { font-size: 1em; padding: 5px 10px;}
        }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            #header-panel { padding: 5px; }
            #timer { font-size: 1.2em; margin-bottom: 2px;}
            #bottom-bar { padding: 5px; min-height: 80px;}
            .bin { width: 70px; height: 70px; font-size: 1.8em; }
            .box { font-size: 3em; }
            .item { font-size: 2.5em; }
            #silo-info { font-size: 1em; padding: 2px 8px;}
        }
        
        /* Adicionado #silo-reveal-screen na lista de telas sobrepostas */
        #start-screen, #end-screen, #tutorial-modals, #silo-reveal-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .hidden { display: none !important; }
        
        button {
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            background-color: transparent;
            color: var(--theme-color);
            border: 2px solid var(--theme-color);
            border-radius: 5px;
            margin-top: 20px;
            font-family: 'VT323', monospace;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        button:hover { background-color: var(--theme-bg); box-shadow: 0 0 10px var(--theme-glow); }
        
        .vt-modal {
            background-color: var(--dark-metal);
            border: 2px solid var(--theme-color);
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            text-align: center;
            transition: all 0.5s ease;
        }
        .vt-modal h2 { margin: 0; font-size: 1.2em; letter-spacing: 1px;}
        .vt-modal-image { font-size: 4em; margin: 5px 0; }
        .vt-modal p { margin: 0; font-size: 1.1em; line-height: 1.3; color: #ddd; min-height: 80px;}
        .vt-modal-buttons { display: flex; gap: 10px; width: 100%; justify-content: center; }
        .vt-modal-buttons button { flex: 1; padding: 10px; font-size: 1em;}

    </style>
</head>
<body>

    <div id="start-screen">
        <h1 id="start-title" class="digital-text" style="font-size: 1.5em; text-align: center;">THE LAST ALLIANCE</h1>
        <p id="start-version" class="digital-text" style="font-size: 0.8em; text-align: center;">PROTÓTIPO AUDIO AR (V14.1)</p>
        <button onclick="startGame()">INICIAR TURNO</button>
    </div>

    <div id="end-screen" class="hidden">
        <h1 id="end-message" class="digital-text" style="font-size: 1.5em; text-align: center;">SISTEMA INCOMPLETO</h1>
        <button onclick="resetGame()">JOGAR NOVAMENTE</button>
    </div>

    <div id="silo-reveal-screen" class="hidden">
        <div class="vt-modal">
            <h2 id="reveal-title" class="digital-text" style="font-size: 1.5em; color: var(--theme-color);"></h2>
            <div id="reveal-icons" class="vt-modal-image"></div>
            <p id="reveal-desc" class="digital-text" style="white-space: pre-wrap; font-size: 1.2em; color: #fff; text-shadow: none;"></p>
            <button onclick="beginTurn()">COMEÇAR</button>
        </div>
    </div>

    <div id="tutorial-modals" class="hidden">
        <div id="modal-0" class="vt-modal hidden">
            <h2 class="digital-text" data-text="OBJETIVO"></h2>
            <div class="vt-modal-image">🕵️‍♂️☢️</div>
            <p id="modal-p-0" data-text="BOAS VINDAS AO MINIGAME NEGOCIALIPSE! ENCONTRE OS RECURSOS NECESSÁRIOS ANTES QUE O TEMPO ACABE!"></p>
            <div class="vt-modal-buttons">
                <button onclick="skipTutorial()">Pular</button>
                <button onclick="nextModal()">Próximo</button>
            </div>
        </div>
        <div id="modal-1" class="vt-modal hidden">
            <h2 class="digital-text" data-text="A ESTEIRA"></h2>
            <div class="vt-modal-image">📦 ➡️ 💥</div>
            <p id="modal-p-1" data-text="A ESTEIRA TRARÁ UMA CAIXA. CLIQUE OU TOQUE NELA PARA ABRIR E REVELAR 3 RECURSOS (OU OUTRA CAIXA...)."></p>
            <div class="vt-modal-buttons">
                <button onclick="skipTutorial()">Pular</button>
                <button onclick="nextModal()">Próximo</button>
            </div>
        </div>
        <div id="modal-2" class="vt-modal hidden">
            <h2 class="digital-text" data-text="COLETA TÁTICA"></h2>
            <div class="vt-modal-image">🔋 ➡️ 🎯</div>
            <p id="modal-p-2" data-text="ARRASTE OS RECURSOS QUE VOCÊ PRECISA (ÁGUA, ENERGIA, COMIDA) PARA OS ÍCONES NA PARTE DE BAIXO."></p>
            <div class="vt-modal-buttons">
                <button onclick="skipTutorial()">Pular</button>
                <button onclick="nextModal()">Próximo</button>
            </div>
        </div>
        <div id="modal-3" class="vt-modal hidden">
            <h2 class="digital-text" data-text="DESCARTE E RE-ROLL"></h2>
            <div class="vt-modal-image">📦 ➡️ 💥</div>
            <p id="modal-p-3" data-text="ITENS INÚTEIS DEVEM SER LANÇADOS PARA O DESCARTE VERMELHO. SE ACHAR OUTRA CAIXINHA (📦), CLIQUE NELA PARA REVELAR OUTROS RECURSOS IMEDIATAMENTE."></p>
            <div class="vt-modal-buttons">
                <button onclick="viewTutorialAgain()">Ver Novamente</button>
                <button onclick="prepareGame()">Avançar</button>
            </div>
        </div>
    </div>

    <div id="hud-frame">
        <div id="header-panel">
            <div id="timer" class="digital-text">01:00</div>
            <div id="silo-info" class="digital-text" style="display: none;"></div>
            <div id="targets" class="digital-text"></div>
        </div>

        <div id="game-area">
            <div id="spawner-container"></div>
            <div id="items-container" class="hidden"></div>
        </div>

        <div id="bottom-bar">
            <div id="needs-bins-cluster"></div>
            <div id="trash-bin-area"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // MOTOR DE ÁUDIO 8-BIT NATIVO (Web Audio API)
        // ==========================================
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;

            switch(type) {
                case 'click': 
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
                    gainNode.gain.setValueAtTime(0.05, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'spawn': 
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(250, now + 0.3);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(0.1, now + 0.15);
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'open': 
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.exponentialRampToValueAtTime(10, now + 0.2);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'score': 
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(987.77, now); 
                    osc.frequency.setValueAtTime(1318.51, now + 0.1); 
                    gainNode.gain.setValueAtTime(0.05, now);
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'trash': 
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(80, now);
                    osc.frequency.exponentialRampToValueAtTime(20, now + 0.15);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                case 'error': 
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, now);
                    osc.frequency.setValueAtTime(100, now + 0.1);
                    gainNode.gain.setValueAtTime(0.1, now);
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'win': 
                    osc.type = 'square';
                    [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => { 
                        osc.frequency.setValueAtTime(freq, now + i * 0.1);
                    });
                    gainNode.gain.setValueAtTime(0.1, now);
                    gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
                    osc.start(now);
                    osc.stop(now + 0.6);
                    break;
                case 'lose': 
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 1.0);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.linearRampToValueAtTime(0, now + 1.0);
                    osc.start(now);
                    osc.stop(now + 1.0);
                    break;
            }
        }

        const GAME_TIME = 60;
        
        const ITEMS = {
            AGUA: { id: 'agua', icon: '💧', name: 'Água' },
            ALIMENTO: { id: 'alimento', icon: '🍎', name: 'Alimento' },
            ENERGIA: { id: 'energia', icon: '🔋', name: 'Energia' },
            SUPRIMENTO: { id: 'suprimento', icon: '📦', name: 'Suprimento' } 
        };
        const ITEM_KEYS = Object.keys(ITEMS);
        const WASTE_ICON = '🗑️'; 

        const kanaHiragana = 'かきくけこさしすせそたちつてとなにぬねのまみむめもやゆよらりるれろわをん';
        const latinAlphanumeric = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*';

        const SILOS = [
            { name: "Fazenda", needs: [ITEMS.ENERGIA, ITEMS.AGUA], theme: { color: '#ff4444', glow: 'rgba(255, 68, 68, 0.7)', bg: 'rgba(255, 68, 68, 0.1)' } },
            { name: "Aquífero", needs: [ITEMS.ALIMENTO, ITEMS.ENERGIA], theme: { color: '#33b5e5', glow: 'rgba(51, 181, 229, 0.7)', bg: 'rgba(51, 181, 229, 0.1)' } },
            { name: "Reator", needs: [ITEMS.ALIMENTO, ITEMS.AGUA], theme: { color: '#ffbb33', glow: 'rgba(255, 187, 51, 0.7)', bg: 'rgba(255, 187, 51, 0.1)' } }
        ];

        let timerInterval;
        let timeLeft = GAME_TIME;
        let currentSilo;
        let targets = {};
        let currentModalIndex = 0;
        let totalModals = 4;

        const hudFrame = document.getElementById('hud-frame');
        const hudTimer = document.getElementById('timer');
        const hudSilo = document.getElementById('silo-info');
        const hudTargets = document.getElementById('targets');
        const spawnerContainer = document.getElementById('spawner-container');
        const itemsContainer = document.getElementById('items-container');
        const needsCluster = document.getElementById('needs-bins-cluster');
        const trashBinArea = document.getElementById('trash-bin-area');
        const startScreen = document.getElementById('start-screen');
        const endScreen = document.getElementById('end-screen');
        const endMessage = document.getElementById('end-message');
        const tutorialModals = document.getElementById('tutorial-modals');
        
        function applyTheme(color, glow, bg) {
            const root = document.documentElement;
            root.style.setProperty('--theme-color', color);
            root.style.setProperty('--theme-glow', glow);
            root.style.setProperty('--theme-bg', bg);
        }

        function getRandomMatrixChar() {
            const pools = [kanaHiragana, latinAlphanumeric];
            const pool = pools[Math.floor(Math.random() * pools.length)];
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function decodeText(element, finalString, speed = 15) {
            return new Promise(resolve => {
                let iterations = 0;
                let step = finalString.length > 20 ? 2 : 1; 
                
                const interval = setInterval(() => {
                    let currentText = "";
                    for (let i = 0; i < finalString.length; i++) {
                        if (i < iterations) {
                            currentText += finalString[i]; 
                        // Agora ele preserva também a quebra de linha (\n)
                        } else if (finalString[i] === ' ' || finalString[i] === '\n') {
                            currentText += finalString[i]; 
                        } else {
                            currentText += getRandomMatrixChar(); 
                        }
                    }
                    element.innerText = currentText;
                    iterations += step;
                    if (iterations > finalString.length + step) {
                        clearInterval(interval);
                        element.innerText = finalString; 
                        resolve();
                    }
                }, speed);
            });
        }

        function startGame() {
            initAudio(); 
            playSound('click');
            startScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            showTutorial();
        }

        async function showTutorial() {
            tutorialModals.classList.remove('hidden');
            currentModalIndex = 0;
            await updateModalView();
        }

        async function updateModalView() {
            for (let i = 0; i < totalModals; i++) {
                document.getElementById(`modal-${i}`).classList.add('hidden');
            }
            const currentModal = document.getElementById(`modal-${currentModalIndex}`);
            currentModal.classList.remove('hidden');

            const header = currentModal.querySelector('h2');
            const p = currentModal.querySelector('p');
            
            await decodeText(header, header.getAttribute('data-text'));
            await decodeText(p, p.getAttribute('data-text'));
        }

        async function nextModal() {
            playSound('click');
            if (currentModalIndex < totalModals - 1) {
                currentModalIndex++;
                await updateModalView();
            }
        }

        function skipTutorial() {
            playSound('click');
            prepareGame();
        }

        async function viewTutorialAgain() {
            playSound('click');
            currentModalIndex = 0;
            await updateModalView();
        }

        // --- NOVA FUNÇÃO: Prepara os dados, o HUD e mostra a Tela de Missão ---
        async function prepareGame() {
            playSound('click');
            tutorialModals.classList.add('hidden');
            
            // Sorteia o Silo e define alvos
            currentSilo = SILOS[Math.floor(Math.random() * SILOS.length)];
            applyTheme(currentSilo.theme.color, currentSilo.theme.glow, currentSilo.theme.bg);
            
            targets = {};
            currentSilo.needs.forEach(item => {
                targets[item.id] = Math.floor(Math.random() * 5) + 8;
            });

            setupTacticLayout(); 
            updateTargetsUI(); 
            
            // Exibe a tela de Missão (Reveal)
            const revealScreen = document.getElementById('silo-reveal-screen');
            revealScreen.classList.remove('hidden');
            
            const title = document.getElementById('reveal-title');
            const icons = document.getElementById('reveal-icons');
            const desc = document.getElementById('reveal-desc');
            
            title.innerText = '';
            desc.innerText = '';
            
            // Formata a string de ícones e a frase descritiva com \n para quebra de linha
            icons.innerText = currentSilo.needs.map(item => item.icon).join(' ');
            
            const req1 = `${targets[currentSilo.needs[0].id]} ${currentSilo.needs[0].name.toUpperCase()}`;
            const req2 = `${targets[currentSilo.needs[1].id]} ${currentSilo.needs[1].name.toUpperCase()}`;
            
            await decodeText(title, "MISSÃO RECEBIDA");
            
            const missionText = `Você pertence ao Silo\n"${currentSilo.name.toUpperCase()}"\n\nE deve encontrar:\n${req1} e ${req2}.`;
            await decodeText(desc, missionText);
        }

        // --- NOVA FUNÇÃO: Libera o controle e inicia o timer ---
        async function beginTurn() {
            playSound('click');
            document.getElementById('silo-reveal-screen').classList.add('hidden');
            
            timeLeft = GAME_TIME;
            hudSilo.style.display = 'inline-block';
            hudSilo.innerText = `SILO DESIGNADO: ${currentSilo.name}`; 
            
            startTimer();
            spawnBox();
            startRandomScreenGlitches();
        }

        function startRandomScreenGlitches() {
            const classes = ['screen-glitch-tilt', 'screen-glitch-fail'];
            function applyRandomGlitch() {
                hudFrame.classList.remove(...classes);
                const randomClass = classes[Math.floor(Math.random() * classes.length)];
                hudFrame.classList.add(randomClass);
                const duration = Math.random() * 100 + 50; 
                setTimeout(() => {
                    hudFrame.classList.remove(randomClass);
                    const nextDelay = Math.random() * 6000 + 3000;
                    setTimeout(applyRandomGlitch, nextDelay);
                }, duration);
            }
            applyRandomGlitch(); 
        }

        function setupTacticLayout() {
            needsCluster.innerHTML = '';
            trashBinArea.innerHTML = '';
            
            currentSilo.needs.forEach(item => {
                const bin = document.createElement('div');
                bin.className = 'bin target-bin';
                bin.dataset.accepts = item.id;
                bin.innerHTML = `${item.icon} <span>${item.name}</span>`;
                needsCluster.appendChild(bin);
            });

            const wasteBin = document.createElement('div');
            wasteBin.className = 'bin waste-bin'; 
            wasteBin.dataset.accepts = 'waste';
            wasteBin.innerHTML = `${WASTE_ICON} <span>Descarte</span>`;
            trashBinArea.appendChild(wasteBin);
        }

        function makeDraggable(element, isSpawner) {
            let startX = 0, startY = 0;
            let initialMouseX = 0, initialMouseY = 0;
            let hasMoved = false;
            
            const itemId = isSpawner ? 'box-spawner' : element.dataset.id;

            function openBox() {
                playSound('open');
                if (isSpawner) {
                    element.classList.add('opening');
                    setTimeout(() => {
                        generateThreeItems(); 
                        element.remove(); 
                    }, 300);
                } else if (itemId === 'suprimento') {
                    element.classList.add('exploding');
                    Array.from(itemsContainer.children).forEach(child => {
                        if (child !== element) child.style.display = 'none';
                    });
                    setTimeout(() => {
                        generateThreeItems();
                        element.remove(); 
                    }, 200);
                }
            }

            function onDragStart(e) {
                if (element.classList.contains('opening') || element.classList.contains('exploding')) return;
                
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                initialMouseX = clientX;
                initialMouseY = clientY;
                hasMoved = false;

                const rect = element.getBoundingClientRect();
                startX = clientX - rect.left;
                startY = clientY - rect.top;

                element.style.position = 'fixed';
                element.style.left = rect.left + 'px';
                element.style.top = rect.top + 'px';
                element.style.margin = '0';
                element.style.zIndex = '9999';
                element.style.transition = 'none'; 
                element.style.pointerEvents = 'none'; 

                document.addEventListener('mousemove', onDragMove, {passive: false});
                document.addEventListener('touchmove', onDragMove, {passive: false});
                document.addEventListener('mouseup', onDragEnd);
                document.addEventListener('touchend', onDragEnd);
            }

            function onDragMove(e) {
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                if (Math.abs(clientX - initialMouseX) > 5 || Math.abs(clientY - initialMouseY) > 5) {
                    hasMoved = true;
                }

                if (!hasMoved) return;
                
                e.preventDefault(); 

                element.style.left = (clientX - startX) + 'px';
                element.style.top = (clientY - startY) + 'px';
                element.style.transform = `scale(1.1)`;

                const dropTarget = document.elementFromPoint(clientX, clientY);
                document.querySelectorAll('.bin').forEach(b => b.classList.remove('drag-over'));
                
                if (dropTarget) {
                    const bin = dropTarget.closest('.bin');
                    if (bin) {
                        bin.classList.add('drag-over');
                    }
                }
            }

            function onDragEnd(e) {
                document.removeEventListener('mousemove', onDragMove);
                document.removeEventListener('touchmove', onDragMove);
                document.removeEventListener('mouseup', onDragEnd);
                document.removeEventListener('touchend', onDragEnd);

                document.querySelectorAll('.bin').forEach(b => b.classList.remove('drag-over'));
                element.style.zIndex = '';
                element.style.transform = `scale(1)`;
                element.style.pointerEvents = ''; 

                let clientX, clientY;
                if (e.changedTouches && e.changedTouches.length > 0) {
                    clientX = e.changedTouches[0].clientX;
                    clientY = e.changedTouches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                if (!hasMoved) {
                    element.style.position = '';
                    element.style.left = '';
                    element.style.top = '';
                    element.style.margin = '';
                    
                    if (isSpawner || itemId === 'suprimento') {
                        openBox(); 
                    }
                    return;
                }

                let validDrop = false;
                const dropTarget = document.elementFromPoint(clientX, clientY);
                const bin = dropTarget ? dropTarget.closest('.bin') : null;

                if (bin) {
                    const accepts = bin.dataset.accepts;
                    
                    if (accepts === 'waste') {
                        validDrop = true;
                        playSound('trash');
                        spawnBox();
                        element.remove(); 
                    }
                    else if (accepts === itemId && targets[itemId] > 0) {
                        validDrop = true;
                        playSound('score');
                        targets[itemId]--;
                        updateTargetsUI();
                        spawnBox();
                        element.remove(); 
                    }
                }

                if (!validDrop) {
                    playSound('error');
                    element.style.transition = 'left 0.2s, top 0.2s';
                    element.style.left = ''; 
                    element.style.top = ''; 
                    setTimeout(() => {
                        element.style.position = ''; 
                        element.style.margin = '';
                        element.style.transition = ''; 
                    }, 200);
                }
            }

            element.addEventListener('mousedown', onDragStart);
            element.addEventListener('touchstart', onDragStart, {passive: false});
        }

        function updateTargetsUI() {
            hudTargets.innerHTML = '';
            let allDone = true;

            currentSilo.needs.forEach(item => {
                const count = targets[item.id];
                if (count > 0) allDone = false;
                
                hudTargets.innerHTML += `
                    <div class="target-item">
                        ${item.icon} FALTA: <span id="target-${item.id}" style="font-family: 'Press Start 2P', cursive; font-size: 0.8em;">${count}</span>
                    </div>
                `;
            });

            if (allDone) gameOver(true);
        }

        function startTimer() {
            hudTimer.innerText = formatTime(timeLeft);
            timerInterval = setInterval(() => {
                timeLeft--;
                hudTimer.innerText = formatTime(timeLeft);
                if (timeLeft <= 0) gameOver(false);
            }, 1000);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function spawnBox() {
            playSound('spawn');
            itemsContainer.classList.add('hidden');
            itemsContainer.innerHTML = '';
            spawnerContainer.innerHTML = ''; 
            
            const boxEl = document.createElement('div');
            boxEl.className = 'box';
            boxEl.innerText = '📦'; 
            boxEl.style.cursor = 'pointer'; 
            
            makeDraggable(boxEl, true); 
            spawnerContainer.appendChild(boxEl);
        }

        function generateThreeItems() {
            spawnerContainer.innerHTML = ''; 
            itemsContainer.classList.remove('hidden');
            itemsContainer.innerHTML = ''; 
            
            for(let i=0; i<3; i++) {
                const randomKey = ITEM_KEYS[Math.floor(Math.random() * ITEM_KEYS.length)];
                const itemData = ITEMS[randomKey];
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item';
                itemDiv.innerText = itemData.icon;
                itemDiv.dataset.id = itemData.id;
                
                if(itemData.id === 'suprimento') {
                    itemDiv.style.cursor = 'pointer'; 
                } else {
                    itemDiv.style.cursor = 'grab'; 
                }

                makeDraggable(itemDiv, false); 
                itemsContainer.appendChild(itemDiv);
            }
        }

        function gameOver(won) {
            clearInterval(timerInterval);
            playSound(won ? 'win' : 'lose');
            spawnerContainer.innerHTML = '';
            itemsContainer.classList.add('hidden');
            startScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
            
            const title = document.getElementById('end-message');
            
            if (won) {
                title.style.color = 'var(--theme-color)'; 
                decodeText(title, `SOBREVIVENTE! TEMPO: ${formatTime(timeLeft)}`);
            } else {
                title.style.color = 'var(--vt-alert)';
                decodeText(title, "COLAPSO DE SISTEMA!");
            }
        }

        function resetGame() {
            playSound('click');
            startScreen.classList.remove('hidden');
            endScreen.classList.add('hidden');
            tutorialModals.classList.add('hidden');
            document.getElementById('silo-reveal-screen').classList.add('hidden'); // Garante que zera
            spawnerContainer.innerHTML = '';
            hudTimer.innerText = '01:00';
            hudSilo.innerText = ''; 
            hudSilo.style.display = 'none'; 
            needsCluster.innerHTML = '';
            trashBinArea.innerHTML = '';

            applyTheme('#00ff41', 'rgba(0, 255, 65, 0.7)', 'rgba(0, 255, 65, 0.1)');

            initStartScreenTyping();
        }

        function initStartScreenTyping() {
            const title = document.getElementById('start-title');
            const version = document.getElementById('start-version');
            title.innerText = 'THE LAST ALLIANCE';
            version.innerText = 'PROTÓTIPO AUDIO AR (V14.1)';
            
            decodeText(title, 'THE LAST ALLIANCE', 30).then(() => {
                decodeText(version, 'PROTÓTIPO AUDIO AR (V14.1)', 10);
            });
        }

        initStartScreenTyping();
    </script>
</body>
</html>
